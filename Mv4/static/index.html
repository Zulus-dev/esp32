<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini OS</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .home-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; margin-top: 40px; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 25px; text-align: center; text-decoration: none; color: white; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,255,65,0.2); }
        .card .icon { font-size: 40px; margin-bottom: 15px; display: block; }
        .card h3 { margin: 0; font-size: 16px; color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align: center;">
            <h1 style="letter-spacing: 2px;">GEMINI <span style="color:var(--accent)">OS</span></h1>
            <p style="opacity: 0.5;">ESP32-C3 Workstation</p>
        </header>

        <div class="home-grid">
            <a href="/explorer.html" class="card">
                <span class="icon">📂</span>
                <h3>Менеджер</h3>
            </a>
            <a href="/editor.html" class="card">
                <span class="icon">📝</span>
                <h3>Редактор</h3>
            </a>
            <a href="/settings.html" class="card">
                <span class="icon">⚙️</span>
                <h3>Настройки</h3>
            </a>
            <a href="/radio.html" class="card">
                <span class="icon">📡</span>
                <h3>Node B</h3>
            </a>
        </div>
    </div>
</body>
</html>

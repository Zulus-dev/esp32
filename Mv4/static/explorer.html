<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorer</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .dual-pane { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; height: 60vh; }
        .pane { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        .pane-header { padding: 8px; background: #222; font-size: 11px; border-bottom: 1px solid #333; overflow: hidden; text-overflow: ellipsis; }
        .file-list { flex-grow: 1; overflow-y: auto; }
        .active-pane { border-color: var(--accent); }
    </style>
</head>
<body>
    <div class="container" style="max-width: 900px;">
        <div class="nav-header">
            <a href="/" class="back-link">← Меню</a>
            <button onclick="createFile()" class="btn-primary" style="margin-left: auto;">+ Файл</button>
            <button onclick="createFolder()" class="btn-primary">+ Папка</button>
            <button onclick="moveItem()" class="btn-primary">MOVE ↔</button>
            <input id="uploadInput" type="file" multiple style="display:none" onchange="uploadFiles(this)">
        </div>

        <div class="dual-pane">
            <div id="pane1" class="pane active-pane" onclick="setActivePane(1)">
                <div id="path1" class="pane-header">/</div>
                <div id="list1" class="file-list"></div>
            </div>
            <div id="pane2" class="pane" onclick="setActivePane(2)">
                <div id="path2" class="pane-header">/</div>
                <div id="list2" class="file-list"></div>
            </div>
        </div>

        <div class="toolbar-grid" style="margin-top: 15px;">
            <button onclick="createFile()">Создать файл</button>
            <button onclick="chooseUpload()">Загрузить на плату</button>
            <button onclick="downloadSelected()">Скачать на ПК</button>
            <button onclick="editSelected()">Открыть/Править</button>
            <button onclick="deleteSelected()" class="btn-danger">Удалить</button>
            <button onclick="refreshAll()">Обновить</button>
        </div>
    </div>
    <script src="/js/explorer.js"></script>
</body>
</html>

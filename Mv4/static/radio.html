<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>CC1101 Sub-GHz</title>
    <style>
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin:12px 0}.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;margin:10px 0}input,select,textarea{width:100%;box-sizing:border-box;padding:9px;background:#1a1a1a;border:1px solid #333;color:white;border-radius:5px;margin:4px 0}.ok{color:var(--accent)}.bad{color:var(--danger)}.event,.pkt{font-family:monospace;font-size:12px;border-bottom:1px solid #222;padding:6px 0;overflow-wrap:anywhere}.warn{border-color:#7a5200;background:#241800}.chart{height:92px;display:flex;align-items:end;gap:2px;border-bottom:1px solid #333}.bar{flex:1;background:var(--accent);min-width:2px;opacity:.8}.small{font-size:12px;opacity:.7}
    </style>
</head>
<body>
<div class="container">
    <a href="/" style="color:var(--accent)">← Назад</a>
    <h2>CC1101 Sub-GHz / Node B</h2>
    <div class="panel">
        <div>Power: <span id="power">?</span> | Link: <span id="link">?</span> | Last: <span id="last">-</span></div>
        <div class="small">Replay/Raw TX требуют подтверждения. Используйте только в разрешённой лабораторной среде.</div>
    </div>
    <div class="grid">
        <button class="btn-primary" onclick="cmd('power_on')">Power on</button>
        <button onclick="cmd('stop')">Stop all</button>
        <button class="btn-danger" onclick="cmd('power_off')">Power off</button>
        <button onclick="cmd('reboot')">Reboot B</button>
    </div>

    <div class="panel">
        <h3>Параметры CC1101</h3>
        <label>Frequency MHz<input id="freq" value="433.920" inputmode="decimal"></label>
        <div class="grid">
            <label>Modulation<select id="mod"><option>OOK</option><option>ASK</option><option>2-FSK</option><option>GFSK</option><option>4-FSK</option></select></label>
            <label>Baud<input id="baud" value="4800" inputmode="numeric"></label>
            <label>Deviation Hz<input id="dev" value="5000" inputmode="numeric"></label>
            <label>Bandwidth Hz<input id="bw" value="58000" inputmode="numeric"></label>
            <label>Sync<input id="sync" value="0xD391"></label>
            <label>Power dBm<input id="power_dbm" value="0" inputmode="numeric"></label>
        </div>
        <div class="grid">
            <button onclick="cmd('set_freq', cfg())">Set freq</button>
            <button onclick="cmd('set_modulation', cfg())">Apply modem</button>
            <button onclick="cmd('set_power', cfg())">Set power</button>
            <button class="btn-primary" onclick="cmd('subghz_scan', cfg())">Continuous scan</button>
            <button onclick="cmd('subghz_sniff', cfg())">Targeted sniff</button>
            <button onclick="cmd('spectrum_sweep', cfg())">Spectrum sweep</button>
        </div>
    </div>

    <div class="panel warn">
        <h3>Replay / Raw TX</h3>
        <textarea id="hex" rows="3" placeholder="HEX payload, e.g. A1B2C3"></textarea>
        <div class="grid">
            <button class="btn-danger" onclick="danger('replay')">Replay selected HEX</button>
            <button class="btn-danger" onclick="danger('raw_tx')">Raw TX HEX</button>
            <button onclick="saveCapture()">Save .subghz</button>
            <button onclick="loadCapture()">Load .subghz</button>
        </div>
    </div>

    <div class="panel"><h3>RSSI realtime</h3><div id="chart" class="chart"></div></div>
    <div class="panel"><h3>Captured packets</h3><div id="packets"></div></div>
    <div class="panel"><h3>Telemetry</h3><div id="events"></div></div>
</div>
<script>
function cfg(){return {freq:val('freq'),mod:val('mod'),baud:val('baud'),dev:val('dev'),bw:val('bw'),sync:val('sync'),power:val('power_dbm')}}
function val(id){return document.getElementById(id).value}
async function cmd(action, extra){const body=Object.assign({action},extra||{});const res=await fetch('/api/radio/cmd',{method:'POST',body:JSON.stringify(body)});render(await res.json())}
function danger(action){if(!confirm('Подтвердите разрешённую передачу Sub-GHz: '+action))return;const body=Object.assign(cfg(),{data:val('hex')});cmd(action,body)}
async function poll(){try{const res=await fetch('/api/radio/status');render(await res.json())}catch(e){}setTimeout(poll,600)}
function render(data){
    by('power').textContent=data.powered?'ON':'OFF';by('power').className=data.powered?'ok':'bad';by('link').textContent=data.online?'ONLINE':'WAIT';by('link').className=data.online?'ok':'bad';by('last').textContent=data.last_status||'-';
    const rss=(data.rssi||[]).slice(-40);by('chart').innerHTML=rss.map(x=>`<div class="bar" title="${x.freq} ${x.rssi_dbm}dBm" style="height:${Math.max(2,Math.min(90,(x.rssi_dbm+110)*2))}px"></div>`).join('');
    const packets=(data.packets||[]).slice().reverse();by('packets').innerHTML=packets.map(p=>`<div class="pkt"><button onclick="pick('${p.data_hex||''}')">Replay</button> <b>${p.freq} MHz</b> ${p.rssi_dbm}dBm ${p.modulation} ${p.len}B<br>${p.data_hex||''}<br><span class="small">${p.ascii||''}</span></div>`).join('')||'<span class="small">Нет пакетов</span>';
    const events=(data.events||[]).slice().reverse();by('events').innerHTML=events.map(e=>`<div class="event"><b>${e.name}</b> ${e.text||''}<br><span class="small">${e.hex||''}</span></div>`).join('')||'<span class="small">Нет событий</span>';
}
function pick(hex){by('hex').value=hex;scrollTo(0,0)}function by(id){return document.getElementById(id)}
function saveCapture(){const data={created:new Date().toISOString(),packets:[...document.querySelectorAll('.pkt')].map(x=>x.innerText)};const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data)],{type:'application/json'}));a.download='capture.subghz';a.click()}
function loadCapture(){alert('Загрузите .subghz через File Explorer и вставьте HEX пакета в редактор для Replay.')}
poll();
</script>
</body>
</html>

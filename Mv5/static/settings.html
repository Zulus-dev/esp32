<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>Настройки WiFi</title>
    <style>
        input { width:100%; box-sizing:border-box; padding:10px; background:#1a1a1a; border:1px solid #333; color:white; margin:10px 0; border-radius:5px; }
        .row { display:flex; align-items:center; gap:10px; margin:10px 0; }
        .hint { opacity:.65; font-size:13px; }
        .status { margin-top:15px; min-height:22px; color:var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" style="color:var(--accent)">← Назад</a>
        <h2>WiFi AP Node A</h2>
        <p class="hint">Настройки сохраняются в <code>wifi_settings.json</code>. Чтобы применить их, выключите и снова включите AP в OLED-меню или перезагрузите Node A.</p>
        <label>Имя точки (SSID):</label>
        <input type="text" id="ssid" maxlength="32" placeholder="ColibryOS">
        <label>Пароль (8–63 символа, пусто = открытая AP):</label>
        <input type="password" id="pass" maxlength="63" placeholder="Оставьте пустым для открытой">
        <div class="row">
            <input type="checkbox" id="hidden" style="width:auto">
            <label for="hidden">Скрытая сеть</label>
        </div>
        <button onclick="saveSettings()" class="btn-primary" style="width:100%; padding:15px; margin-top:20px">СОХРАНИТЬ</button>
        <div id="status" class="status"></div>
    </div>
    <script>
        const statusEl = document.getElementById('status');
        async function loadSettings() {
            try {
                const res = await fetch('/api/wifi_settings');
                const data = await res.json();
                document.getElementById('ssid').value = data.essid || 'ColibryOS';
                document.getElementById('pass').value = data.password || '';
                document.getElementById('hidden').checked = !!data.hidden;
            } catch (e) {
                statusEl.textContent = 'Не удалось прочитать настройки: ' + e;
            }
        }
        async function saveSettings() {
            const data = {
                essid: document.getElementById('ssid').value.trim() || 'ColibryOS',
                password: document.getElementById('pass').value,
                hidden: document.getElementById('hidden').checked
            };
            if (data.essid.length > 32) { alert('SSID должен быть до 32 символов'); return; }
            if (data.password && data.password.length < 8) { alert('Пароль должен быть от 8 символов'); return; }
            statusEl.textContent = 'Сохранение...';
            const res = await fetch('/api/wifi_settings', { method: 'POST', body: JSON.stringify(data) });
            const ans = await res.json();
            if (!res.ok || !ans.ok) {
                statusEl.textContent = 'Ошибка: ' + (ans.error || res.status);
                return;
            }
            statusEl.textContent = 'Сохранено. Перезапустите AP через OLED-меню WiFi → Off AP → On AP.';
        }
        loadSettings();
    </script>
</body>
</html>
